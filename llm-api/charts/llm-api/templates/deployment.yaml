apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llm-api.fullname" . }}
  labels:
    {{- include "llm-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "llm-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llm-api.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: {{ .Values.env.app.LOG_LEVEL | quote }}
            - name: LOG_JSON
              value: {{ .Values.env.app.LOG_JSON | quote }}
            - name: LLAMA_MODEL
              value: {{ .Values.env.app.LLAMA_MODEL | quote }}
            - name: GPU_ENABLED
              value: {{ .Values.env.app.GPU_ENABLED | quote }}
            - name: CONTEXT_SIZE
              value: {{ .Values.env.app.CONTEXT_SIZE | quote }}
            - name: MAX_TOKENS
              value: {{ .Values.env.app.MAX_TOKENS | quote }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

