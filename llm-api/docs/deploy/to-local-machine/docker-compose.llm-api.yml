version: "3.9"

# Локальный запуск llm-api
# Использование: 
#   cd llm-api/docs/deploy/to-local-machine
#   docker compose -f docker-compose.llm-api.yml build --no-cache
#   docker compose -f docker-compose.llm-api.yml --env-file .env up -d

services:
  llm-api:
    build:
      context: ../../../
      dockerfile: Dockerfile
    image: llm-api:local
    container_name: llm-api-local
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-false}
      LLAMA_MODEL: ${LLAMA_MODEL:-llama-3.1-8b-instruct}
      GPU_ENABLED: ${GPU_ENABLED:-true}
      CONTEXT_SIZE: ${CONTEXT_SIZE:-2048}
      MAX_TOKENS: ${MAX_TOKENS:-512}
      LOCAL_MODEL_PATH: ${LOCAL_MODEL_PATH:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Для GPU (Compose v2 + NVIDIA Container Toolkit)
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]

