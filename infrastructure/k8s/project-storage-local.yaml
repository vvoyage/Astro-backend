apiVersion: v1
kind: PersistentVolume
metadata:
  name: project-storage-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  hostPath:
    path: /data/project-storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: project-storage-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
